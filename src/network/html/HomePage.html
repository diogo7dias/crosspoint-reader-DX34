<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0d10" />
    <title>CrossPoint Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/brutalist.css" />
    <style>
      /* Tokens, reset, .wrap, .chip, nav.nav, .foot, and reduced-motion
         live in /css/brutalist.css — shared across all web UI pages.
         Page-specific layout below. */
      :root {
        --h1-size: clamp(44px, 11vw, 96px);
        --num-size: clamp(32px, 7vw, 56px);
      }

      /* ── Masthead ───────────────────────────────────────────── */
      .mast {
        border: 1px dashed var(--dash);
        padding: var(--pad);
        display: grid;
        grid-template-columns: 1fr;
        gap: var(--pad);
      }
      @media (min-width: 760px) {
        .mast { grid-template-columns: 1fr 1fr; }
        .mast .rt { border-left: 1px dashed var(--dash); padding-left: var(--pad); }
      }

      .mast h1 {
        margin: 0;
        font-weight: 700;
        font-size: var(--h1-size);
        line-height: 0.88;
        letter-spacing: -0.04em;
        text-transform: uppercase;
      }
      .mast h1 em { font-style: normal; color: var(--red); }
      .mast .sub {
        margin-top: 10px;
        font-size: 11px;
        letter-spacing: 0.28em;
        color: var(--muted);
        text-transform: uppercase;
      }

      .sprite {
        display: grid;
        grid-template-columns: repeat(16, 5px);
        grid-auto-rows: 5px;
        margin-top: 14px;
      }
      @media (min-width: 500px) {
        .sprite { grid-template-columns: repeat(16, 6px); grid-auto-rows: 6px; }
      }
      .sprite i { background: transparent; }
      .sprite i.f { background: var(--yellow); }
      .sprite i.r { background: var(--red); }
      .sprite i.g { background: var(--green); }

      .mast .rt {
        display: flex;
        flex-direction: column;
        gap: 14px;
        justify-content: space-between;
      }
      .time {
        font-size: clamp(26px, 6vw, 42px);
        font-weight: 700;
        color: var(--yellow);
        letter-spacing: 0.04em;
        line-height: 1;
      }
      .time small {
        display: block;
        font-size: 11px;
        letter-spacing: 0.26em;
        color: var(--muted);
        margin-top: 6px;
      }

      .chips {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      @media (max-width: 360px) { .chips { grid-template-columns: 1fr; } }
      @media (min-width: 600px) { .chips { grid-template-columns: repeat(2, 1fr); } }

      /* ── Numerals board ─────────────────────────────────────── */
      .board {
        margin-top: var(--gap);
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }
      @media (min-width: 520px) { .board { grid-template-columns: repeat(2, 1fr); } }
      @media (min-width: 900px) { .board { grid-template-columns: repeat(3, 1fr); } }
      .tile {
        border: 1px dashed var(--dash);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-height: 140px;
      }
      .tile .lbl {
        font-size: 10px;
        letter-spacing: 0.28em;
        color: var(--muted);
        text-transform: uppercase;
      }
      .tile .num {
        font-size: var(--num-size);
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.02em;
        word-break: break-all;
      }
      .tile .num small {
        font-size: 0.38em;
        color: var(--muted);
        font-weight: 400;
        letter-spacing: 0.04em;
        margin-left: 4px;
      }
      .tile .foot {
        font-size: 10px;
        letter-spacing: 0.18em;
        color: var(--muted);
        text-transform: uppercase;
        margin-top: auto;
      }
      .tile .foot b { color: var(--fg); font-weight: 400; }
      .tile.a .num { color: var(--green); }
      .tile.b .num { color: var(--yellow); }
      .tile.c .num { color: var(--blue); }

      /* Signal-strength pixel bar for WIFI tile */
      .bars {
        display: inline-grid;
        grid-template-columns: repeat(10, 1fr);
        gap: 2px;
        margin-top: 8px;
        width: 100%;
        max-width: 220px;
      }
      .bars i {
        height: 12px;
        background: rgba(255,255,255,.08);
        border: 1px dashed rgba(255,255,255,.2);
      }
      .bars i.on { background: var(--blue); border-color: #000; }

      /* Tighter masthead padding on tiny screens (the rest of the
         small-screen overrides live in brutalist.css). */
      @media (max-width: 380px) {
        .mast { padding: 14px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <!-- Masthead -->
      <header class="mast">
        <div class="lt">
          <h1>CROSS<br /><em>POINT</em></h1>
          <div class="sub">Reader &middot; Web UI &middot; <span id="mode">—</span></div>
          <div class="sprite" id="sprite" aria-hidden="true"></div>
        </div>
        <div class="rt">
          <div class="time">
            <span id="clock">—</span>
            <small id="date">—</small>
          </div>
          <div class="chips">
            <div class="chip green"><b data-i18n="STR_WEB_FIRMWARE">Firmware</b><em id="chip-fw">—</em></div>
            <div class="chip yellow"><b data-i18n="STR_WEB_HEAP_FREE">Heap</b><em id="chip-heap">—</em></div>
            <div class="chip blue"><b>WiFi</b><em id="chip-rssi">—</em></div>
            <div class="chip red"><b>IP</b><em id="chip-ip">—</em></div>
          </div>
        </div>
      </header>

      <!-- Nav -->
      <nav class="nav" aria-label="Primary">
        <a href="/" class="on"><span class="k">[1]</span><span data-i18n="STR_WEB_HOME">HOME</span></a>
        <a href="/files"><span class="k">[2]</span><span data-i18n="STR_WEB_FILES">FILES</span></a>
        <a href="/fonts"><span class="k">[3]</span><span data-i18n="STR_WEB_FONTS">FONTS</span></a>
      </nav>

      <!-- Numerals board -->
      <section class="board" aria-label="Device status">
        <div class="tile a">
          <div class="lbl" data-i18n="STR_WEB_UPTIME">Uptime</div>
          <div class="num" id="tile-uptime">—</div>
          <div class="foot"><b id="uptime-detail">—</b></div>
        </div>
        <div class="tile b">
          <div class="lbl" data-i18n="STR_WEB_HEAP_FREE">Heap Free</div>
          <div class="num" id="tile-heap">—<small>KB</small></div>
          <div class="foot"><b id="heap-detail">—</b> <span data-i18n="STR_WEB_BYTES">bytes</span></div>
        </div>
        <div class="tile c">
          <div class="lbl" data-i18n="STR_WEB_WIFI_SIGNAL">WiFi Signal</div>
          <div class="num" id="tile-rssi">—<small>dBm</small></div>
          <div class="bars" id="bars" aria-hidden="true"></div>
          <div class="foot"><b id="rssi-detail">—</b></div>
        </div>
      </section>

      <!-- Footer -->
      <footer class="foot">
        <span><b data-i18n="STR_WEB_HOST">Host</b> crosspoint.local</span>
        <span><b>IP</b> <span id="foot-ip">—</span></span>
        <span><b data-i18n="STR_WEB_MODE">Mode</b> <span id="foot-mode">—</span></span>
        <span class="heart">&bull; Open-source &middot; MIT</span>
      </footer>
    </div>

    <script>
      // i18n bootstrap — fetches device-language dict, swaps [data-i18n] / [data-i18n-attr]
      // Exposes window.tr(KEY) for use in dynamic JS-emitted strings.
      window.__i18nReady = (async function() {
        try {
          const r = await fetch('/api/i18n.json', { cache: 'no-cache' });
          if (!r.ok) throw new Error('i18n fetch failed: ' + r.status);
          const dict = await r.json();
          window.__i18nDict = dict;
          window.tr = (k) => (dict && dict[k]) || k;
          const apply = () => {
            document.querySelectorAll('[data-i18n]').forEach(el => {
              const k = el.dataset.i18n;
              if (dict[k]) el.textContent = dict[k];
            });
            document.querySelectorAll('[data-i18n-attr]').forEach(el => {
              el.dataset.i18nAttr.split(',').forEach(pair => {
                const [a, k] = pair.split(':').map(s => s.trim());
                if (a && k && dict[k]) el.setAttribute(a, dict[k]);
              });
            });
          };
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', apply, { once: true });
          } else { apply(); }
        } catch (e) {
          window.tr = (k) => k;
          console.warn('i18n init failed, using English fallback:', e);
        }
      })();

      // ── tiny pixel-art sprite (16 × 12) ──────────────────────
      (function () {
        var pat = [
          "..ffff....ffff..",
          ".f....f..f....f.",
          "f......ff......f",
          "f..rr......rr..f",
          "f..rr......rr..f",
          "f......ff......f",
          "f..............f",
          ".f..gg....gg..f.",
          "..f..gggggg..f..",
          "...ff......ff...",
          ".....ffffff.....",
          "................"
        ];
        var el = document.getElementById("sprite");
        if (!el) return;
        var frag = document.createDocumentFragment();
        for (var y = 0; y < pat.length; y++) {
          for (var x = 0; x < pat[y].length; x++) {
            var c = pat[y][x];
            var i = document.createElement("i");
            if (c === "f") i.className = "f";
            else if (c === "r") i.className = "r";
            else if (c === "g") i.className = "g";
            frag.appendChild(i);
          }
        }
        el.appendChild(frag);
      })();

      // ── wall clock ──────────────────────────────────────────
      function pad(n) { return n < 10 ? "0" + n : "" + n; }
      function tick() {
        var d = new Date();
        var clk = document.getElementById("clock");
        var dt = document.getElementById("date");
        if (clk) clk.textContent = pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
        if (dt) {
          var days = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
          var months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
          dt.textContent = days[d.getDay()] + " · " + pad(d.getDate()) + " " + months[d.getMonth()] + " " + d.getFullYear();
        }
      }
      tick();
      setInterval(tick, 1000);

      // ── helpers ─────────────────────────────────────────────
      function fmtUptime(sec) {
        sec = Math.max(0, Math.floor(sec));
        var d = Math.floor(sec / 86400);
        var h = Math.floor((sec % 86400) / 3600);
        var m = Math.floor((sec % 3600) / 60);
        var s = sec % 60;
        return { d: d, h: h, m: m, s: s };
      }
      function rssiBars(rssi) {
        // -50 or better: 10 bars, -100 or worse: 0 bars
        if (!rssi) return 0;
        var n = Math.round((rssi + 100) / 5);
        if (n < 0) n = 0;
        if (n > 10) n = 10;
        return n;
      }
      function rssiLabel(rssi) {
        if (rssi === 0 || rssi === undefined || rssi === null) return "—";
        const t = window.tr || ((k) => k);
        if (rssi >= -50) return t("STR_WEB_RSSI_EXCELLENT");
        if (rssi >= -60) return t("STR_WEB_RSSI_GOOD");
        if (rssi >= -70) return t("STR_WEB_RSSI_FAIR");
        if (rssi >= -80) return t("STR_WEB_RSSI_WEAK");
        return t("STR_WEB_RSSI_POOR");
      }

      // ── pixel bars for signal ──────────────────────────────
      (function () {
        var el = document.getElementById("bars");
        if (!el) return;
        for (var i = 0; i < 10; i++) el.appendChild(document.createElement("i"));
      })();
      function setBars(rssi) {
        var n = rssiBars(rssi);
        var cells = document.querySelectorAll("#bars i");
        for (var i = 0; i < cells.length; i++) {
          cells[i].className = i < n ? "on" : "";
        }
      }

      // ── fetch + render /api/status ─────────────────────────
      function setText(id, v) {
        var el = document.getElementById(id);
        if (el) el.textContent = v;
      }
      async function fetchStatus() {
        try {
          var resp = await fetch("/api/status", { cache: "no-store" });
          if (!resp.ok) throw new Error("status " + resp.status);
          var d = await resp.json();

          setText("chip-fw", d.version || "—");
          setText("chip-ip", d.ip || "—");
          setText("foot-ip", d.ip || "—");
          setText("mode", (d.mode || "—") + " mode");
          setText("foot-mode", d.mode || "—");

          // Heap
          if (typeof d.freeHeap === "number") {
            var kb = Math.round(d.freeHeap / 1024);
            setText("chip-heap", kb + " KB");
            var tileHeap = document.getElementById("tile-heap");
            if (tileHeap) tileHeap.innerHTML = kb + "<small>KB</small>";
            setText("heap-detail", d.freeHeap.toLocaleString());
          }

          // RSSI
          if (typeof d.rssi === "number") {
            var rssi = d.rssi;
            if (rssi === 0 && d.mode === "AP") {
              setText("chip-rssi", "AP");
              var tileRssi = document.getElementById("tile-rssi");
              if (tileRssi) tileRssi.innerHTML = "AP<small>mode</small>";
              setText("rssi-detail", (window.tr || ((k)=>k))("STR_WEB_AP_HOST"));
              setBars(-50);
            } else {
              setText("chip-rssi", rssi + " dBm");
              var tileRssi2 = document.getElementById("tile-rssi");
              if (tileRssi2) tileRssi2.innerHTML = rssi + "<small>dBm</small>";
              setText("rssi-detail", rssiLabel(rssi));
              setBars(rssi);
            }
          }

          // Uptime
          if (typeof d.uptime === "number") {
            var u = fmtUptime(d.uptime);
            var big = u.d > 0 ? (u.d + "d") : (u.h > 0 ? (u.h + "h") : (u.m + "m"));
            var tileUp = document.getElementById("tile-uptime");
            if (tileUp) {
              var unit = big.slice(-1);
              var val = big.slice(0, -1);
              tileUp.innerHTML = val + "<small>" + unit + "</small>";
            }
            setText("uptime-detail",
              pad(u.d) + "d " + pad(u.h) + "h " + pad(u.m) + "m " + pad(u.s) + "s · " + (window.tr || ((k)=>k))("STR_WEB_STABLE"));
          }
        } catch (err) {
          console.error("status fetch failed", err);
        }
      }
      window.addEventListener("load", fetchStatus);
      setInterval(fetchStatus, 5000);
    </script>
  </body>
</html>
