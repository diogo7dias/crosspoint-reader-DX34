STR_WEB_CDN_MISSING: "Impossible de charger les bibliothèques de fontes depuis internet. Cette page nécessite que <b>le téléphone / ordinateur que vous utilisez</b> ait une connexion internet active (l'appareil lui-même n'en a pas besoin). Réparez la connexion du client et rechargez cette page. L'installation ne fonctionnera pas tant que les bibliothèques ne sont pas chargées."
STR_WEB_INSTALL_HELP: "Déposez un TTF ou OTF pour chaque variante souhaitée. Seul <b>Régulier</b> est requis — Gras, Italique et Gras italique sont synthétisés depuis Régulier lorsque vous les laissez vides. Choisissez une ou plusieurs tailles (25–40 pt) ; le navigateur rastérise chaque glyphe à chaque taille, compresse la sortie et la diffuse vers l'appareil. L'appareil lit les glyphes depuis la carte SD à la demande, donc même les grandes tailles ne bloquent pas la RAM."
