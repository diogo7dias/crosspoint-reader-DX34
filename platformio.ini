[platformio]
default_envs = default

[crosspoint]
version = v5.5.7

[base]
platform = espressif32 @ 6.12.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
check_tool = cppcheck
check_flags = --enable=all --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=*:*/.pio/* --inline-suppr
check_skip_packages = yes

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000

build_flags =
  -Os
  -ffunction-sections
  -fdata-sections
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DMINIZ_NO_ZLIB_COMPATIBLE_NAMES=1
  -DMINIZ_NO_STDIO=1
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
# https://libexpat.github.io/doc/api/latest/#XML_GE
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -std=gnu++2a
# Enable UTF-8 long file names in SdFat
  -DUSE_UTF8_LONG_NAMES=1
# WebSockets lib: default TCP send/recv timeout is 5 s, which causes the WS
# server to drop the connection during multi-MB uploads when SD writes block
# longer than that. 30 s gives slow-SD writes plenty of headroom.
  -DWEBSOCKETS_TCP_TIMEOUT=30000
# Increase PNG scanline buffer to support up to 2048px wide images
# Default is (320*4+1)*2=2562, we need more for larger images
  -DPNG_MAX_BUFFERED_PIXELS=16416
# Wrap panic functions to capture crash info to RTC memory (see lib/hal/HalSystem)
  -Wl,--gc-sections,--wrap=panic_print_backtrace,--wrap=panic_abort
  -fno-exceptions

build_unflags =
  -std=gnu++11
  -fexceptions

; Board configuration
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv

extra_scripts =
  pre:scripts/build_html.py
  pre:scripts/gen_i18n.py
  pre:scripts/patch_jpegdec.py
  pre:scripts/check_alloc_seam.py

; Libraries
lib_deps =
  BatteryMonitor=symlink://open-x4-sdk/libs/hardware/BatteryMonitor
  InputManager=symlink://open-x4-sdk/libs/hardware/InputManager
  EInkDisplay=symlink://open-x4-sdk/libs/display/EInkDisplay
  SDCardManager=symlink://open-x4-sdk/libs/hardware/SDCardManager
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1
  bitbank2/PNGdec @ ^1.0.0
  links2004/WebSockets @ 2.7.3
  https://github.com/bitbank2/JPEGDEC.git#86282979224c8a32fd51e091ed5a35b0c699a52b

[env:default]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"CrossPoint-Mod-DX34-${crosspoint.version}\"
  ; Unified shuffled wallpaper rotation (single contiguous buffer + new-on-top
  ; insertion). Promoted to default for v2.0.0 release after debug-env soak.
  -DFEATURE_WALLPAPER_V2=1

[env:debug]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"CrossPoint-Mod-DX34-${crosspoint.version}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2
  -DFEATURE_WALLPAPER_V2=1


[env:gh_release]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release builds
  -DFEATURE_WALLPAPER_V2=1

[env:gh_release_rc]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-rc+${sysenv.CROSSPOINT_RC_HASH}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release candidate builds
  -DFEATURE_WALLPAPER_V2=1

[env:slim]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-slim\"
  ; serial output is disabled in slim builds to save space
  -UENABLE_SERIAL_LOG
  -DFEATURE_WALLPAPER_V2=1

; Host-only test environment — runs on developer machine, no ESP32 toolchain.
; Compiles a narrow slice of src/ (lifecycle/) plus stubs for activities.
; Invoke:  pio test -e test_host
[env:test_host]
platform = native
test_framework = unity
test_build_src = true
lib_compat_mode = strict
lib_deps =
  bblanchon/ArduinoJson @ 7.4.2
lib_ignore =
  BatteryMonitor
  InputManager
  EInkDisplay
  SDCardManager
  QRCode
  PNGdec
  WebSockets
  JPEGDEC
  BookFingerprint
  EpdFont
  GfxRenderer
  Logging
  MappedInputManager
  hal
build_src_filter =
  -<*>
  +<lifecycle/ActivityRouter.cpp>
  +<network/ws/WsUploadSession.cpp>
  +<network/SettingsGateway.cpp>
  +<sleep/WallpaperPlaylistV2.cpp>
  +<persist/InMemoryFileIO.cpp>
  +<persist/PersistManager.cpp>
  +<persist/CrossPointStateJson.cpp>
  +<activities/reader/ReaderProgressTracker.cpp>
  +<activities/reader/ReaderSession.cpp>
  +<activities/reader/HighlightController.cpp>
  +<util/FavoriteImageNames.cpp>
  +<activities/home/LibraryListingFilter.cpp>
build_flags =
  -std=gnu++2a
  -DUNIT_TEST_HOST=1
  -Isrc
build_unflags =
  -std=gnu++11

# Pure layout-primitive unit tests (RFC #164): DegradeLevel/DegradePlan +
# LayoutArena. The headers live under lib/Epub/Epub/layout/ but depend only on
# <cstdint>/<cstring>/<new>, so we ignore every hardware-coupled lib (same list
# as test_sim) to keep LDF from compiling the monolithic lib/Epub, and resolve
# the headers via -I. Header-only: no src/lib .cpp are compiled into the test.
# Run: pio test -e test_layout -f test_layout_primitives
[env:test_layout]
platform = native
test_framework = unity
lib_compat_mode = strict
lib_ignore =
  BatteryMonitor
  InputManager
  EInkDisplay
  SDCardManager
  QRCode
  PNGdec
  WebSockets
  JPEGDEC
  BookFingerprint
  EpdFont
  GfxRenderer
  Logging
  MappedInputManager
  hal
  Epub
  ZipFile
  Utf8
  JpegToBmpConverter
  PngToBmpConverter
build_flags =
  -std=gnu++2a
  -DUNIT_TEST_HOST=1
  -I lib/Epub/Epub
build_unflags =
  -std=gnu++11

# Host reader-simulator. Compiles the REAL EPUB layout engine (ParsedText)
# against metrics-only shadow headers (no display/SD/Arduino) and runs it under
# SimHeap allocation-failure injection. LDF is off and only the specific lib
# sources the slice needs are compiled (via ../lib paths) so the monolithic
# hardware-coupled parts of lib/Epub are NOT pulled in.
[env:test_sim]
platform = native
test_framework = unity
test_build_src = true
lib_compat_mode = strict
# Ignore the hardware-coupled / monolithic libs so LDF does not compile them.
# The specific layout sources the slice needs are compiled explicitly via
# build_src_filter (../lib paths); their headers resolve via -I below. LDF stays
# ON (default) so the unity test framework is still found.
lib_ignore =
  BatteryMonitor
  InputManager
  EInkDisplay
  SDCardManager
  QRCode
  PNGdec
  WebSockets
  JPEGDEC
  BookFingerprint
  EpdFont
  GfxRenderer
  Logging
  MappedInputManager
  hal
  Epub
  ZipFile
  Utf8
build_src_filter =
  -<*>
  +<../lib/Epub/Epub/ParsedText.cpp>
  +<../lib/EpdFont/EpdFontFamily.cpp>
  +<../lib/EpdFont/EpdFont.cpp>
  +<../lib/Utf8/Utf8.cpp>
build_flags =
  -std=gnu++2a
  -DUNIT_TEST_HOST=1
  -I test/test_reader_sim/sim_shadows
  -I test/test_sim_heap
  -I lib/Epub
  -I lib/Epub/Epub
  -I lib/EpdFont
  -I lib/EpdFont/builtinFonts
  -I lib/Utf8
  -I lib/HeapGuard
  -I lib/Memory
build_unflags =
  -std=gnu++11

# Host ZIP-decompress sim. Runs the REAL ZipFile + miniz against a real .epub on
# host, under SimHeap, to prove the inflate path is memory-stable under
# fragmentation and to measure decompress timing. ZipFile/miniz are pulled in
# via #include wrappers in the test dir; HalStorage is a stdio-backed shadow.
[env:test_sim_zip]
platform = native
test_framework = unity
test_build_src = true
lib_compat_mode = strict
lib_ignore =
  BatteryMonitor
  InputManager
  EInkDisplay
  SDCardManager
  QRCode
  PNGdec
  WebSockets
  JPEGDEC
  BookFingerprint
  EpdFont
  GfxRenderer
  Logging
  MappedInputManager
  hal
  Epub
  ZipFile
  miniz
  InflateReader
build_src_filter =
  -<*>
build_flags =
  -std=gnu++2a
  -DUNIT_TEST_HOST=1
  -DSIM_EPUB_PATH=\"/Users/diogomoreira/Documents/GITHUB-PROJECTS/crosspoint-reader-DX34/test/test_reader_sim/fixtures/book.epub\"
  -I test/test_reader_sim_zip/shadows
  -I test/test_sim_heap
  -I lib/ZipFile
  -I lib/miniz
  -I lib/Memory
build_unflags =
  -std=gnu++11

# Host parse sim. Runs the REAL ChapterHtmlSlimParser (expat -> ParsedText ->
# Page) on a real EPUB chapter under SimHeap — the allocation-heaviest stage of
# open-a-book. Real EPUB sources pulled via #include wrapper TUs; hardware +
# image-decoder + Epub stubbed; system libexpat linked.
[env:test_sim_parse]
platform = native
test_framework = unity
test_build_src = true
lib_compat_mode = strict
lib_ignore =
  BatteryMonitor
  InputManager
  EInkDisplay
  SDCardManager
  QRCode
  PNGdec
  WebSockets
  JPEGDEC
  BookFingerprint
  EpdFont
  GfxRenderer
  Logging
  MappedInputManager
  hal
  Epub
  ZipFile
  miniz
  InflateReader
  Utf8
  FsHelpers
  Serialization
  expat
build_src_filter =
  -<*>
build_flags =
  -std=gnu++2a
  -DUNIT_TEST_HOST=1
  -DSIM_EPUB_PATH=\"/Users/diogomoreira/Documents/GITHUB-PROJECTS/crosspoint-reader-DX34/test/test_reader_sim/fixtures/book.epub\"
  -I test/test_reader_sim_parse/shadows
  -I test/test_sim_heap
  -I lib/Epub
  -I lib/Epub/Epub
  -I lib/Epub/Epub/converters
  -I lib/EpdFont
  -I lib/EpdFont/builtinFonts
  -I lib/Utf8
  -I lib/HeapGuard
  -I lib/Memory
  -I lib/Serialization
  -I lib/FsHelpers
  -I lib/ZipFile
  -I lib/miniz
  -lexpat
build_unflags =
  -std=gnu++11
